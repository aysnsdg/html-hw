<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div style="display: flex; flex-direction: column; gap: 10px; width: 200px">
      <label for="text">Enter your name</label>
      <input type="text" placeholder="text" />

      <label for="email">Your email</label>
      <input type="email" placeholder="email" />

      <label for="password">Enter your password</label>
      <input type="password" placeholder="Password" />

      <label for="number">Choose your age</label>
      <input type="number" placeholder="number" />

      <label for="date">Insert your birthday</label>
      <input type="date" placeholder="date" />

      <label for="textarea">About</label>
      <textarea placeholder="Textarea"></textarea>

      <label for="select">Choose your hometown</label>
      <select name="select" id="select">
        <option value="1">Baku</option>
        <option value="2">Sumgayit</option>
        <option value="3">Ganja</option>
      </select>

      <label for="radio">Choose your gender</label>
      <input type="radio" name="gender" id="male" />
      <label for="male">Male</label>

      <input type="radio" name="gender" id="female" />
      <label for="female">Female</label>


      <label for="checkbox">Choose your top 3 hobbies</label>
      
      <input type="checkbox" name="hobby" id="1" />
      <label for="1">Reading</label>

      <input type="checkbox" name="hobby" id="2" />
      <label for="2">Listening to music</label>

      <input type="checkbox" name="hobby" id="3" />
      <label for="3">Painting</label>

      <input type="checkbox" name="hobby" id="4" />
      <label for="4">Poetry</label>

      <input type="checkbox" name="hobby" id="5" />
      <label for="1">Watching movies/films</label>

      <input type="submit" name="send" id="send" />
      <label for="send">Send your form</label>

      <input type="reset" name="reset" id="reset1" />
      <label for="reset1">Delete everything</label>
    </div>
  </body>
</html>
